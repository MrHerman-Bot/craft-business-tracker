<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Board</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: white;
            --text-primary: #2d3748;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow: rgba(0,0,0,0.05);
            --card-bg: #f8fafc;
        }
        
        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: rgba(0,0,0,0.3);
            --card-bg: #1e293b;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        
        /* Dark Mode Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .theme-toggle:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        .theme-toggle .icon {
            font-size: 1.2rem;
        }
        
        /* Header */
        .page-header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            color: var(--text-secondary);
        }
        
        .back-btn:hover {
            color: var(--text-primary);
        }
        
        .page-header h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        
        /* Task Board */
        .tasks-board {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .board-columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .board-column {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 10px var(--shadow);
        }
        
        .board-column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }
        
        .board-column-header:hover {
            opacity: 0.8;
        }
        
        .board-column-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .collapse-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            transition: transform 0.3s;
        }
        
        .collapse-btn.collapsed {
            transform: rotate(-90deg);
        }
        
        .board-column-content {
            transition: all 0.3s;
            overflow: hidden;
        }
        
        .board-column-content.collapsed {
            max-height: 0;
            opacity: 0;
        }
        
        .board-column-content:not(.collapsed) {
            max-height: 2000px;
            opacity: 1;
        }
        
        .column-sort {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sort-select {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.8rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
        }
        
        .sort-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .sort-direction {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
        }
        
        .sort-direction:hover {
            color: #667eea;
        }
        
        .board-column.todo .board-column-header {
            border-color: #f59e0b;
        }
        
        .board-column.doing .board-column-header {
            border-color: #3b82f6;
        }
        
        .board-column.done .board-column-header {
            border-color: #10b981;
        }
        
        .board-column-header h3 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .board-column.todo h3 { color: #f59e0b; }
        .board-column.doing h3 { color: #3b82f6; }
        .board-column.done h3 { color: #10b981; }
        
        .task-count {
            background: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100px;
        }
        
        .task-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid;
        }
        
        .task-card:hover {
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateY(-2px);
        }
        
        .task-card.todo { border-left-color: #f59e0b; }
        .task-card.doing { border-left-color: #3b82f6; }
        .task-card.done { border-left-color: #10b981; }
        
        .task-card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .task-card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
        }
        
        .task-assignee {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        
        .task-avatar {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.6rem;
            font-weight: 600;
        }
        
        .task-due {
            color: var(--text-secondary);
        }
        
        .task-due.overdue {
            color: #ef4444;
            font-weight: 600;
        }
        
        .add-task-btn {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--border-color);
            background: transparent;
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        
        .add-task-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input::placeholder {
            color: var(--text-secondary);
        }
        
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-secondary);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-danger {
            background: #fee2e2;
            color: #ef4444;
        }
        
        .status-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .status-option {
            padding: 8px 16px;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        
        .form-group input[type="date"] {
            width: auto;
            min-width: 140px;
            max-width: 200px;
        }
        
        .recurring-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }
        
        .recurring-select {
            padding: 10px 12px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            width: 100%;
        }
        
        .recurring-select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .recurring-custom {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .recurring-custom input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            text-align: center;
        }
        
        .recurring-custom select {
            flex: 1;
            min-width: 120px;
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .recurring-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .recurring-badge.daily { background: #dbeafe; color: #1d4ed8; }
        .recurring-badge.weekly { background: #dcfce7; color: #15803d; }
        .recurring-badge.monthly { background: #fef3c7; color: #b45309; }
        
        .status-option:hover,
        .status-option.active {
            border-color: #667eea;
            background: #e0e7ff;
            color: #667eea;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span class="icon">🌙</span>
        <span id="themeText">Dark</span>
    </button>
    
    <header class="page-header">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h2>Task Board</h2>
    </header>
    
    <div class="tasks-board">
        <div class="board-columns">
            <div class="board-column todo">
                <div class="board-column-header" onclick="toggleColumnCollapse('todo')">
                    <div class="board-column-header-left">
                        <button class="collapse-btn" id="collapse-todo" onclick="event.stopPropagation()">▼</button>
                        <h3>📝 To Do</h3>
                    </div>
                    <div class="column-sort" onclick="event.stopPropagation()">
                        <select class="sort-select" id="sort-todo" onchange="sortTasks('todo')">
                            <option value="">Sort by...</option>
                            <option value="title">Description</option>
                            <option value="due">Due Date</option>
                            <option value="assignee">Employee</option>
                        </select>
                        <button class="sort-direction" id="sortDir-todo" onclick="toggleSortDirection('todo')">↑</button>
                        <span class="task-count" id="countTodo">0</span>
                    </div>
                </div>
                <div class="board-column-content" id="content-todo">
                    <div class="task-list" id="todoList"></div>
                    <button class="add-task-btn" onclick="event.stopPropagation(); showAddTaskModal('todo')">+ Add Task</button>
                </div>
            </div>
            
            <div class="board-column doing">
                <div class="board-column-header" onclick="toggleColumnCollapse('doing')">
                    <div class="board-column-header-left">
                        <button class="collapse-btn" id="collapse-doing" onclick="event.stopPropagation()">▼</button>
                        <h3>🔄 In Progress</h3>
                    </div>
                    <div class="column-sort" onclick="event.stopPropagation()">
                        <select class="sort-select" id="sort-doing" onchange="sortTasks('doing')">
                            <option value="">Sort by...</option>
                            <option value="title">Description</option>
                            <option value="due">Due Date</option>
                            <option value="assignee">Employee</option>
                        </select>
                        <button class="sort-direction" id="sortDir-doing" onclick="toggleSortDirection('doing')">↑</button>
                        <span class="task-count" id="countDoing">0</span>
                    </div>
                </div>
                <div class="board-column-content" id="content-doing">
                    <div class="task-list" id="doingList"></div>
                    <button class="add-task-btn" onclick="event.stopPropagation(); showAddTaskModal('doing')">+ Add Task</button>
                </div>
            </div>
            
            <div class="board-column done">
                <div class="board-column-header" onclick="toggleColumnCollapse('done')">
                    <div class="board-column-header-left">
                        <button class="collapse-btn" id="collapse-done" onclick="event.stopPropagation()">▼</button>
                        <h3>✅ Done</h3>
                    </div>
                    <div class="column-sort" onclick="event.stopPropagation()">
                        <select class="sort-select" id="sort-done" onchange="sortTasks('done')">
                            <option value="">Sort by...</option>
                            <option value="title">Description</option>
                            <option value="due">Due Date</option>
                            <option value="assignee">Employee</option>
                        </select>
                        <button class="sort-direction" id="sortDir-done" onclick="toggleSortDirection('done')">↑</button>
                        <span class="task-count" id="countDone">0</span>
                    </div>
                </div>
                <div class="board-column-content" id="content-done">
                    <div class="task-list" id="doneList"></div>
                    <button class="add-task-btn" onclick="event.stopPropagation(); showAddTaskModal('done')">+ Add Task</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add Task</h3>
                <button class="modal-close" onclick="closeTaskModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editingTaskId">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title">
                </div>
                <div class="form-group">
                    <label>Assign To</label>
                    <select id="taskAssignee">
                        <option value="">Select person...</option>
                        <option value="Alex Thompson">Alex Thompson</option>
                        <option value="Jordan Smith">Jordan Smith</option>
                        <option value="Casey Johnson">Casey Johnson</option>
                        <option value="Sam Parker">Sam Parker</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="taskDue">
                </div>
                <div class="form-group">
                    <label>🔁 Recurring Task</label>
                    <select class="recurring-select" id="taskRecurring" onchange="toggleRecurringOptions()">
                        <option value="">One-time task</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="biweekly">Bi-weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="custom">Custom...</option>
                    </select>
                    <div class="recurring-options" id="recurringOptions" style="display: none;">
                        <div class="recurring-custom" id="customWeekly" style="display: none;">
                            <label>Every</label>
                            <select id="customDay">
                                <option value="1">Monday</option>
                                <option value="2">Tuesday</option>
                                <option value="3">Wednesday</option>
                                <option value="4">Thursday</option>
                                <option value="5">Friday</option>
                                <option value="6">Saturday</option>
                                <option value="0">Sunday</option>
                            </select>
                        </div>
                        <div class="recurring-custom" id="customMonthly" style="display: none;">
                            <label>Every</label>
                            <input type="number" id="customWeekNum" min="1" max="5" value="1">
                            <select id="customMonthDay">
                                <option value="1">Monday</option>
                                <option value="2">Tuesday</option>
                                <option value="3">Wednesday</option>
                                <option value="4">Thursday</option>
                                <option value="5">Friday</option>
                                <option value="6">Saturday</option>
                                <option value="0">Sunday</option>
                            </select>
                            <span>of the month</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <div class="status-select">
                        <div class="status-option" data-status="todo" onclick="selectStatus('todo')">To Do</div>
                        <div class="status-option" data-status="doing" onclick="selectStatus('doing')">In Progress</div>
                        <div class="status-option" data-status="done" onclick="selectStatus('done')">Done</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="deleteTaskBtn" onclick="deleteTask()" style="margin-right: auto; display: none;">Delete</button>
                <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
            </div>
        </div>
    </div>
    
    <script>
        // Check and generate any recurring tasks due today
        function generateDueRecurringTasks() {
            const today = new Date().toISOString().split('T')[0];
            const allTasks = JSON.parse(localStorage.getItem('tasks')) || [];
            const newTasksCreated = [];
            
            // Get all recurring task templates (tasks that have recurring pattern)
            const recurringTemplates = allTasks.filter(t => t.recurring && t.recurring.type);
            
            // Group by title + assignee to find unique recurring tasks
            const processedPatterns = new Set();
            
            recurringTemplates.forEach(template => {
                const patternKey = `${template.title}|${template.assignee}|${template.recurring.type}`;
                if (processedPatterns.has(patternKey)) return;
                processedPatterns.add(patternKey);
                
                // Check if there's already a pending task for this pattern
                const pendingExists = allTasks.some(t => 
                    t.title === template.title && 
                    t.assignee === template.assignee &&
                    t.status !== 'done' &&
                    t.due && t.due >= today
                );
                
                // If no pending task exists, check if we need to create one
                if (!pendingExists) {
                    // Find the most recent completed task of this type
                    const completedTasks = allTasks.filter(t => 
                        t.title === template.title && 
                        t.assignee === template.assignee &&
                        t.status === 'done' &&
                        t.due
                    ).sort((a, b) => new Date(b.due) - new Date(a.due));
                    
                    const lastTask = completedTasks[0];
                    let nextDue = null;
                    
                    if (lastTask) {
                        nextDue = generateNextOccurrence(template.recurring, lastTask.due);
                    } else if (template.due) {
                        // No completed tasks yet, use template due date
                        const templateDue = new Date(template.due);
                        if (templateDue <= new Date(today)) {
                            nextDue = today;
                        }
                    }
                    
                    // If next due date is today or in the past, create it
                    if (nextDue && nextDue <= today) {
                        const newTask = {
                            id: Date.now() + Math.random(),
                            title: template.title,
                            assignee: template.assignee,
                            due: today,
                            status: 'todo',
                            recurring: template.recurring
                        };
                        allTasks.push(newTask);
                        newTasksCreated.push(newTask);
                    }
                }
            });
            
            // Save if new tasks were created
            if (newTasksCreated.length > 0) {
                localStorage.setItem('tasks', JSON.stringify(allTasks));
                tasks = allTasks;
                return true;
            }
            return false;
        }
        
        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const isDark = savedTheme === 'dark';
            
            if (isDark) {
                document.body.classList.add('dark-mode');
                document.getElementById('themeText').textContent = 'Light';
                document.querySelector('#themeToggle .icon').textContent = '☀️';
            }
        }
        
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle('dark-mode');
            
            // Save preference
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // Update button
            document.getElementById('themeText').textContent = isDark ? 'Light' : 'Dark';
            document.querySelector('#themeToggle .icon').textContent = isDark ? '☀️' : '🌙';
        }
        
        // Initialize theme on load
        initTheme();
        
        // Default tasks
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [
            { id: 1, title: 'Restock Zone A shelves', status: 'todo', assignee: 'Casey Johnson', due: '2025-05-25' },
            { id: 2, title: 'Update inventory spreadsheet', status: 'doing', assignee: 'Jordan Smith', due: '2025-05-24' },
            { id: 3, title: 'Clean workshop area', status: 'done', assignee: 'Alex Thompson', due: '2025-05-23' },
            { id: 4, title: 'Order new supplies', status: 'todo', assignee: 'Jordan Smith', due: '2025-05-26' },
            { id: 5, title: 'Quality check batch #42', status: 'doing', assignee: 'Casey Johnson', due: '2025-05-24' }
        ];
        
        // Check for recurring tasks due today
        generateDueRecurringTasks();
        
        let currentStatus = 'todo';
        let sortState = { todo: { field: '', asc: true }, doing: { field: '', asc: true }, done: { field: '', asc: true } };
        
        // Column collapse/expand
        function toggleColumnCollapse(column) {
            const content = document.getElementById(`content-${column}`);
            const btn = document.getElementById(`collapse-${column}`);
            content.classList.toggle('collapsed');
            btn.classList.toggle('collapsed');
            btn.textContent = content.classList.contains('collapsed') ? '▶' : '▼';
        }
        
        // Sort tasks in a column
        function sortTasks(column) {
            const select = document.getElementById(`sort-${column}`);
            const field = select.value;
            sortState[column].field = field;
            renderTasksForColumn(column);
        }
        
        // Toggle sort direction
        function toggleSortDirection(column) {
            sortState[column].asc = !sortState[column].asc;
            const btn = document.getElementById(`sortDir-${column}`);
            btn.textContent = sortState[column].asc ? '↑' : '↓';
            if (sortState[column].field) {
                renderTasksForColumn(column);
            }
        }
        
        // Render tasks for a specific column with sorting
        function renderTasksForColumn(column) {
            const list = document.getElementById(`${column}List`);
            list.innerHTML = '';
            
            let columnTasks = tasks.filter(t => t.status === column);
            const { field, asc } = sortState[column];
            
            if (field) {
                columnTasks.sort((a, b) => {
                    let valA = (a[field] || '').toString().toLowerCase();
                    let valB = (b[field] || '').toString().toLowerCase();
                    if (valA < valB) return asc ? -1 : 1;
                    if (valA > valB) return asc ? 1 : -1;
                    return 0;
                });
            }
            
            columnTasks.forEach(task => {
                list.appendChild(createTaskCard(task));
            });
        }
        
        // Load tasks on page load
        loadTasks();
        
        function loadTasks() {
            // Count tasks
            const counts = { todo: 0, doing: 0, done: 0 };
            tasks.forEach(task => {
                counts[task.status]++;
            });
            
            // Update counts
            document.getElementById('countTodo').textContent = counts.todo;
            document.getElementById('countDoing').textContent = counts.doing;
            document.getElementById('countDone').textContent = counts.done;
            
            // Update dashboard badge with total pending tasks (todo + doing)
            updateTaskBadge(counts.todo + counts.doing);
            
            // Render each column with sorting
            ['todo', 'doing', 'done'].forEach(column => {
                renderTasksForColumn(column);
            });
        }
        
        // Update dashboard badge via localStorage
        function updateTaskBadge(count) {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                localStorage.setItem(`badge_tasks_${user.email}`, count.toString());
            }
        }
        
        function createTaskCard(task) {
            const div = document.createElement('div');
            div.className = `task-card ${task.status}`;
            div.onclick = () => editTask(task.id);
            
            const today = new Date().toISOString().split('T')[0];
            const isOverdue = task.due && task.due < today && task.status !== 'done';
            
            div.innerHTML = `
                <div class="task-card-title">${task.title} ${formatRecurringBadge(task.recurring)}</div>
                <div class="task-card-meta">
                    <div class="task-assignee">
                        <div class="task-avatar">${getInitials(task.assignee)}</div>
                        <span>${task.assignee || 'Unassigned'}</span>
                    </div>
                    <div class="task-due ${isOverdue ? 'overdue' : ''}">${formatDate(task.due)}</div>
                </div>
            `;
            
            return div;
        }
        
        function getInitials(name) {
            return name ? name.split(' ').map(n => n[0]).join('') : '?';
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        function showAddTaskModal(status) {
            currentStatus = status;
            document.getElementById('modalTitle').textContent = 'Add Task';
            document.getElementById('editingTaskId').value = '';
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskAssignee').value = '';
            document.getElementById('taskDue').value = '';
            document.getElementById('taskRecurring').value = '';
            document.getElementById('deleteTaskBtn').style.display = 'none';
            
            // Hide recurring options
            document.getElementById('recurringOptions').style.display = 'none';
            document.getElementById('customWeekly').style.display = 'none';
            
            // Set status selection
            document.querySelectorAll('.status-option').forEach(opt => {
                opt.classList.remove('active');
                if (opt.dataset.status === status) {
                    opt.classList.add('active');
                }
            });
            
            document.getElementById('taskModal').classList.add('active');
        }
        
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            
            currentStatus = task.status;
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('editingTaskId').value = id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskAssignee').value = task.assignee;
            document.getElementById('taskDue').value = task.due;
            document.getElementById('deleteTaskBtn').style.display = 'inline-block';
            
            // Set recurring values
            if (task.recurring) {
                document.getElementById('taskRecurring').value = task.recurring.type;
                document.getElementById('recurringOptions').style.display = 'flex';
                
                if (task.recurring.type === 'custom' && task.recurring.dayOfWeek !== undefined) {
                    document.getElementById('customDay').value = task.recurring.dayOfWeek;
                    document.getElementById('customWeekly').style.display = 'flex';
                }
            } else {
                document.getElementById('taskRecurring').value = '';
                document.getElementById('recurringOptions').style.display = 'none';
                document.getElementById('customWeekly').style.display = 'none';
            }
            
            // Set status selection
            document.querySelectorAll('.status-option').forEach(opt => {
                opt.classList.remove('active');
                if (opt.dataset.status === task.status) {
                    opt.classList.add('active');
                }
            });
            
            document.getElementById('taskModal').classList.add('active');
        }
        
        // Recurring task functions
        function toggleRecurringOptions() {
            const select = document.getElementById('taskRecurring');
            const options = document.getElementById('recurringOptions');
            const customWeekly = document.getElementById('customWeekly');
            const customMonthly = document.getElementById('customMonthly');
            
            if (select.value === '') {
                options.style.display = 'none';
            } else {
                options.style.display = 'flex';
                customWeekly.style.display = 'none';
                customMonthly.style.display = 'none';
                
                if (select.value === 'custom') {
                    customWeekly.style.display = 'flex';
                }
            }
        }
        
        function getRecurringData() {
            const type = document.getElementById('taskRecurring').value;
            if (!type) return null;
            
            const data = { type };
            
            if (type === 'custom') {
                data.dayOfWeek = parseInt(document.getElementById('customDay').value);
            }
            
            return data;
        }
        
        function formatRecurringBadge(recurring) {
            if (!recurring) return '';
            
            const icons = {
                daily: '↻',
                weekly: '↻',
                biweekly: '↻',
                monthly: '↻',
                custom: '↻'
            };
            
            const labels = {
                daily: 'Daily',
                weekly: 'Weekly',
                biweekly: 'Bi-weekly',
                monthly: 'Monthly',
                custom: 'Custom'
            };
            
            return `<span class="recurring-badge ${recurring.type}">${icons[recurring.type]} ${labels[recurring.type]}</span>`;
        }
        
        function generateNextOccurrence(recurring, currentDue) {
            if (!recurring || !currentDue) return null;
            
            const date = new Date(currentDue);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            switch (recurring.type) {
                case 'daily':
                    date.setDate(date.getDate() + 1);
                    break;
                case 'weekly':
                    date.setDate(date.getDate() + 7);
                    break;
                case 'biweekly':
                    date.setDate(date.getDate() + 14);
                    break;
                case 'monthly':
                    date.setMonth(date.getMonth() + 1);
                    break;
                case 'custom':
                    if (recurring.dayOfWeek !== undefined) {
                        // Find next occurrence of specific day
                        const daysUntil = (recurring.dayOfWeek + 7 - date.getDay()) % 7;
                        date.setDate(date.getDate() + (daysUntil || 7));
                    }
                    break;
            }
            
            return date.toISOString().split('T')[0];
        }
        
        function selectStatus(status) {
            currentStatus = status;
            document.querySelectorAll('.status-option').forEach(opt => {
                opt.classList.remove('active');
                if (opt.dataset.status === status) {
                    opt.classList.add('active');
                }
            });
        }
        
        function saveTask() {
            const id = document.getElementById('editingTaskId').value;
            const title = document.getElementById('taskTitle').value.trim();
            const assignee = document.getElementById('taskAssignee').value;
            const due = document.getElementById('taskDue').value;
            const recurring = getRecurringData();
            
            if (!title) {
                alert('Please enter a task title');
                return;
            }
            
            if (id) {
                // Edit existing
                const task = tasks.find(t => t.id === parseInt(id));
                if (task) {
                    task.title = title;
                    task.assignee = assignee;
                    task.due = due;
                    task.status = currentStatus;
                    task.recurring = recurring;
                }
            } else {
                // Add new
                const newTask = {
                    id: Date.now(),
                    title: title,
                    assignee: assignee,
                    due: due,
                    status: currentStatus,
                    recurring: recurring
                };
                tasks.push(newTask);
            }
            
            // Save and reload
            localStorage.setItem('tasks', JSON.stringify(tasks));
            loadTasks();
            closeTaskModal();
        }
        
        function deleteTask() {
            const id = document.getElementById('editingTaskId').value;
            if (!id) return;
            
            if (confirm('Delete this task?')) {
                tasks = tasks.filter(t => t.id !== parseInt(id));
                localStorage.setItem('tasks', JSON.stringify(tasks));
                loadTasks();
                closeTaskModal();
            }
        }
        
        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('active');
        }
        
        // Close modal on outside click
        document.getElementById('taskModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeTaskModal();
            }
        });
    </script>
</body>
</html>
