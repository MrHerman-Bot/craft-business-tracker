<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: white;
            --text-primary: #2d3748;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow: rgba(0,0,0,0.05);
            --card-bg: #f8fafc;
            --sent-msg: #667eea;
            --sent-text: white;
            --received-msg: #e2e8f0;
            --received-text: #2d3748;
        }
        
        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: rgba(0,0,0,0.3);
            --card-bg: #1e293b;
            --received-msg: #334155;
            --received-text: #f1f5f9;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        
        /* Dark Mode Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .theme-toggle:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        /* Header */
        .page-header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            color: var(--text-secondary);
        }
        
        .page-header h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        
        .new-message-btn {
            margin-left: auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        /* Messages Container */
        .messages-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Contact List View */
        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .section-header {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 16px 0 8px;
            padding: 0 8px;
        }
        
        .section-header:first-child {
            margin-top: 0;
        }
        
        .contact-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 2px 8px var(--shadow);
        }
        
        .contact-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
            border-color: #667eea;
        }
        
        .contact-card.unread {
            border-left: 4px solid #667eea;
        }
        
        .contact-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .contact-avatar.team {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 16px;
        }
        
        .contact-info {
            flex: 1;
            min-width: 0;
        }
        
        .contact-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .contact-name .team-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: #e0e7ff;
            color: #667eea;
            border-radius: 10px;
            font-weight: 500;
        }
        
        .last-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .last-message.unread {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .contact-meta {
            text-align: right;
            flex-shrink: 0;
        }
        
        .message-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .unread-count {
            background: #ef4444;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }
        
        /* Conversation View */
        .conversation-view {
            display: none;
            flex-direction: column;
            height: calc(100vh - 140px);
            max-height: 700px;
        }
        
        .conversation-view.active {
            display: flex;
        }
        
        .conversation-header {
            background: var(--bg-secondary);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .back-to-contacts {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
        }
        
        .conversation-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .conversation-avatar.team {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 12px;
        }
        
        .conversation-info {
            flex: 1;
        }
        
        .conversation-info h3 {
            font-size: 1rem;
            color: var(--text-primary);
        }
        
        .conversation-info p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            animation: messageAppear 0.2s ease;
        }
        
        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-bubble.sent {
            align-self: flex-end;
            background: var(--sent-msg);
            color: var(--sent-text);
            border-bottom-right-radius: 4px;
        }
        
        .message-bubble.received {
            align-self: flex-start;
            background: var(--received-msg);
            color: var(--received-text);
            border-bottom-left-radius: 4px;
        }
        
        .message-bubble .sender-name {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }
        
        .message-bubble .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        
        .date-separator {
            text-align: center;
            margin: 16px 0;
            position: relative;
        }
        
        .date-separator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }
        
        .date-separator span {
            background: var(--bg-primary);
            padding: 0 16px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            position: relative;
        }
        
        .message-input-container {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .message-input {
            flex: 1;
            border: 2px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            resize: none;
            min-height: 48px;
            max-height: 120px;
            font-family: inherit;
        }
        
        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* New Message Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .modal-search {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal-body {
            overflow-y: auto;
            flex: 1;
            padding: 0 20px 20px;
        }
        
        .contact-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .contact-option:hover {
            background: var(--bg-primary);
        }
        
        .contact-option .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .contact-option .avatar.team {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 12px;
        }
        
        .contact-option .info {
            flex: 1;
        }
        
        .contact-option .name {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .contact-option .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        /* Print transcript button */
        .print-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px;
            margin-left: auto;
            transition: color 0.2s;
        }
        
        .print-btn:hover {
            color: var(--text-primary);
        }
        
        /* Read-only indicator */
        .read-only-banner {
            background: #fef3c7;
            color: #92400e;
            padding: 8px 16px;
            font-size: 0.85rem;
            text-align: center;
            border-bottom: 1px solid #fcd34d;
        }
        
        body.dark-mode .read-only-banner {
            background: #451a03;
            color: #fcd34d;
            border-bottom-color: #78350f;
        }
        
        @media print {
            body * {
                visibility: hidden;
            }
            .printable-transcript, .printable-transcript * {
                visibility: visible;
            }
            .printable-transcript {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span class="icon" id="themeIcon">🌙</span>
        <span id="themeText">Dark</span>
    </button>
    
    <header class="page-header">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h2>Messages</h2>
        <button class="new-message-btn" onclick="showNewMessageModal()">+ New</button>
    </header>
    
    <div class="messages-container">
        <!-- Contacts List View -->
        <div class="contacts-list" id="contactsList">
            <!-- Populated by JavaScript -->
        </div>
        
        <!-- Conversation View -->
        <div class="conversation-view" id="conversationView">
            <div class="conversation-header" id="conversationHeader">
                <button class="back-to-contacts" onclick="showContactsList()">←</button>
                <div class="conversation-avatar" id="conversationAvatar">AT</div>
                <div class="conversation-info">
                    <h3 id="conversationName">Alex Thompson</h3>
                    <p id="conversationStatus">Online</p>
                </div>
                <button class="print-btn" onclick="printTranscript()" title="Print Transcript">🖨️</button>
            </div>
            <div class="messages-list" id="messagesList">
                <!-- Messages populated by JavaScript -->
            </div>
            <div class="message-input-container">
                <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    
    <!-- New Message Modal -->
    <div class="modal-overlay" id="newMessageModal">
        <div class="modal">
            <div class="modal-header">
                <h3>New Message</h3>
                <button class="modal-close" onclick="closeNewMessageModal()">×</button>
            </div>
            <div class="modal-search">
                <input type="text" class="search-input" id="contactSearch" placeholder="Search contacts..." oninput="filterContacts()">
            </div>
            <div class="modal-body" id="newMessageContacts">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </div>
    
    <script>
        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const isDark = savedTheme === 'dark';
            
            if (isDark) {
                document.body.classList.add('dark-mode');
                document.getElementById('themeText').textContent = 'Light';
                document.getElementById('themeIcon').textContent = '☀️';
            }
        }
        
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle('dark-mode');
            
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeText').textContent = isDark ? 'Light' : 'Dark';
            document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
        }
        
        initTheme();
        
        // Current user
        const currentUser = JSON.parse(localStorage.getItem('currentUser')) || { name: 'Alex Thompson', email: 'owner@company.com' };
        
        // Get current user's role
        function getCurrentUserRole() {
            const emp = employees.find(e => e.email === currentUser.email);
            return emp?.role || 'Employee';
        }
        
        // Check if user can view all team messages (Owners, Managers, HR)
        function canViewAllTeamMessages() {
            const role = getCurrentUserRole();
            return ['Owner', 'Manager', 'HR'].includes(role);
        }
        
        // Check if user can send messages to teams
        function canSendToTeams() {
            const role = getCurrentUserRole();
            return ['Owner', 'Manager', 'HR'].includes(role);
        }
        
        // Check if user can view a specific team conversation
        function canViewTeamConversation(teamId) {
            // Owners, Managers, HR can see all team conversations
            if (canViewAllTeamMessages()) return true;
            
            // Regular employees can only see their own team's conversations
            const user = employees.find(e => e.email === currentUser.email);
            return user && user.team?.toLowerCase() === teamId;
        }
        
        // Check if user can send to a specific team
        function canSendToTeam(teamId) {
            // Only Owners, Managers, HR can send to teams
            if (!canSendToTeams()) return false;
            return true;
        }
        
        // Employees and Teams data
        const employees = [
            { name: 'Alex Thompson', email: 'owner@company.com', role: 'Owner', team: 'Admin' },
            { name: 'Jordan Smith', email: 'manager@company.com', role: 'Manager', team: 'Production' },
            { name: 'Casey Johnson', email: 'employee@company.com', role: 'Employee', team: 'Warehouse' },
            { name: 'Sam Parker', email: 'hr@company.com', role: 'HR', team: 'Admin' },
            { name: 'Taylor Reed', email: 'lead@company.com', role: 'Team Lead', team: 'Sales' },
            { name: 'Morgan Lee', email: 'warehouse@company.com', role: 'Employee', team: 'Warehouse' }
        ];
        
        const teams = [
            { name: 'Production Team', id: 'production', members: ['Jordan Smith'] },
            { name: 'Sales Team', id: 'sales', members: ['Taylor Reed'] },
            { name: 'Warehouse Team', id: 'warehouse', members: ['Casey Johnson', 'Morgan Lee'] },
            { name: 'Admin Team', id: 'admin', members: ['Alex Thompson', 'Sam Parker'] }
        ];
        
        // Messages storage
        let conversations = JSON.parse(localStorage.getItem('conversations')) || {};
        
        // Current conversation
        let currentConversationId = null;
        
        // Initialize demo conversations if empty
        function initDemoConversations() {
            if (Object.keys(conversations).length === 0) {
                const today = new Date().toISOString().split('T')[0];
                
                conversations = {
                    'jordan@company.com': {
                        contact: employees[1],
                        messages: [
                            { id: 1, sender: 'Jordan Smith', text: 'Hey, can we talk about the inventory?', time: '10:30 AM', date: today },
                            { id: 2, sender: 'You', text: 'Sure, what\'s up?', time: '10:32 AM', date: today }
                        ],
                        unread: 0
                    },
                    'warehouse-team': {
                        contact: teams[2],
                        isTeam: true,
                        messages: [
                            { id: 1, sender: 'Alex Thompson', text: 'Team meeting at 3 PM today', time: '9:00 AM', date: today },
                            { id: 2, sender: 'Casey Johnson', text: 'Got it, I\'ll be there', time: '9:05 AM', date: today }
                        ],
                        unread: 1
                    }
                };
                
                localStorage.setItem('conversations', JSON.stringify(conversations));
            }
        }
        
        initDemoConversations();
        
        // Render contacts list
        function renderContactsList() {
            const container = document.getElementById('contactsList');
            container.innerHTML = '';
            
            // Sort conversations by most recent message
            const sortedConversations = Object.entries(conversations).sort((a, b) => {
                const aLast = a[1].messages[a[1].messages.length - 1];
                const bLast = b[1].messages[b[1].messages.length - 1];
                return (bLast?.id || 0) - (aLast?.id || 0);
            });
            
            // Filter visible conversations based on role
            const visibleConversations = sortedConversations.filter(([id, conv]) => {
                if (!conv.isTeam) return true; // Individual conversations always visible
                return canViewTeamConversation(id); // Filter teams by role
            });
            
            // Team Conversations Section
            const teamConversations = visibleConversations.filter(([_, conv]) => conv.isTeam);
            if (teamConversations.length > 0) {
                container.innerHTML += '<div class="section-header">Team Conversations</div>';
                teamConversations.forEach(([id, conv]) => {
                    container.appendChild(createContactCard(id, conv));
                });
            }
            
            // Individual Conversations Section
            const individualConversations = visibleConversations.filter(([_, conv]) => !conv.isTeam);
            if (individualConversations.length > 0) {
                container.innerHTML += '<div class="section-header">Direct Messages</div>';
                individualConversations.forEach(([id, conv]) => {
                    container.appendChild(createContactCard(id, conv));
                });
            }
            
            // Empty state if no conversations
            if (visibleConversations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        <h3>No messages yet</h3>
                        <p>Start a conversation by clicking "New"</p>
                    </div>
                `;
            }
        }
        
        // Create contact card element
        function createContactCard(id, conversation) {
            const lastMsg = conversation.messages[conversation.messages.length - 1];
            const isTeam = conversation.isTeam;
            
            const card = document.createElement('div');
            card.className = `contact-card ${conversation.unread > 0 ? 'unread' : ''}`;
            card.onclick = () => openConversation(id);
            
            card.innerHTML = `
                <div class="contact-avatar ${isTeam ? 'team' : ''}">
                    ${getInitials(conversation.contact.name)}
                </div>
                <div class="contact-info">
                    <div class="contact-name">
                        ${conversation.contact.name}
                        ${isTeam ? '<span class="team-badge">Team</span>' : ''}
                    </div>
                    <div class="last-message ${conversation.unread > 0 ? 'unread' : ''}">
                        ${lastMsg ? (lastMsg.sender === 'You' ? 'You: ' : '') + lastMsg.text : 'No messages'}
                    </div>
                </div>
                <div class="contact-meta">
                    <div class="message-time">${lastMsg?.time || ''}</div>
                    ${conversation.unread > 0 ? `<span class="unread-count">${conversation.unread}</span>` : ''}
                </div>
            `;
            
            return card;
        }
        
        // Open conversation
        function openConversation(conversationId) {
            currentConversationId = conversationId;
            const conversation = conversations[conversationId];
            
            if (!conversation) return;
            
            // Mark as read
            if (conversation.unread > 0) {
                conversation.unread = 0;
                localStorage.setItem('conversations', JSON.stringify(conversations));
                renderContactsList();
                updateMessageBadge();
            }
            
            // Update header
            const isTeam = conversation.isTeam;
            document.getElementById('conversationAvatar').textContent = getInitials(conversation.contact.name);
            document.getElementById('conversationAvatar').className = `conversation-avatar ${isTeam ? 'team' : ''}`;
            document.getElementById('conversationName').textContent = conversation.contact.name;
            document.getElementById('conversationStatus').textContent = isTeam ? `${teams.find(t => t.id === conversationId)?.members.length || 0} members` : 'Online';
            
            // Check if user can send to this conversation
            const canSend = !isTeam || canSendToTeam(conversationId);
            const inputContainer = document.querySelector('.message-input-container');
            
            // Show read-only banner for team conversations where user can't send
            const existingBanner = document.getElementById('readOnlyBanner');
            if (existingBanner) existingBanner.remove();
            
            if (isTeam && !canSend) {
                const banner = document.createElement('div');
                banner.id = 'readOnlyBanner';
                banner.className = 'read-only-banner';
                banner.textContent = '🔒 Read-only: Only Owners, Managers, and HR can send team messages';
                document.getElementById('conversationView').insertBefore(banner, document.getElementById('conversationHeader').nextSibling);
                inputContainer.style.display = 'none';
            } else {
                inputContainer.style.display = 'flex';
            }
            
            // Render messages
            renderMessages(conversation);
            
            // Show conversation view
            document.getElementById('contactsList').style.display = 'none';
            document.querySelector('.page-header h2').textContent = conversation.contact.name;
            document.querySelector('.new-message-btn').style.display = 'none';
            document.getElementById('conversationView').classList.add('active');
            
            // Scroll to bottom
            setTimeout(() => {
                const messagesList = document.getElementById('messagesList');
                messagesList.scrollTop = messagesList.scrollHeight;
            }, 50);
        }
        
        // Render messages
        function renderMessages(conversation) {
            const container = document.getElementById('messagesList');
            container.innerHTML = '';
            
            let lastDate = '';
            
            conversation.messages.forEach(msg => {
                // Add date separator if new date
                if (msg.date !== lastDate) {
                    const dateSep = document.createElement('div');
                    dateSep.className = 'date-separator';
                    dateSep.innerHTML = `<span>${formatDate(msg.date)}</span>`;
                    container.appendChild(dateSep);
                    lastDate = msg.date;
                }
                
                const isSent = msg.sender === 'You';
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${isSent ? 'sent' : 'received'}`;
                
                // Show sender name for team messages (except if it's you)
                let senderHtml = '';
                if (conversation.isTeam && !isSent) {
                    senderHtml = `<div class="sender-name">${msg.sender}</div>`;
                }
                
                bubble.innerHTML = `
                    ${senderHtml}
                    ${msg.text}
                    <div class="message-time">${msg.time}</div>
                `;
                
                container.appendChild(bubble);
            });
        }
        
        // Show contacts list
        function showContactsList() {
            currentConversationId = null;
            document.getElementById('contactsList').style.display = 'flex';
            document.querySelector('.page-header h2').textContent = 'Messages';
            document.querySelector('.new-message-btn').style.display = 'block';
            document.getElementById('conversationView').classList.remove('active');
            renderContactsList();
        }
        
        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentConversationId) return;
            
            const conversation = conversations[currentConversationId];
            
            // Check permissions for team messages
            if (conversation.isTeam && !canSendToTeam(currentConversationId)) {
                alert('Only Owners, Managers, and HR can send messages to teams.');
                return;
            }
            
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            const date = now.toISOString().split('T')[0];
            
            const message = {
                id: Date.now(),
                sender: 'You',
                text: text,
                time: time,
                date: date
            };
            
            conversation.messages.push(message);
            localStorage.setItem('conversations', JSON.stringify(conversations));
            
            input.value = '';
            input.style.height = 'auto';
            
            renderMessages(conversation);
            
            // Scroll to bottom
            const messagesList = document.getElementById('messagesList');
            messagesList.scrollTop = messagesList.scrollHeight;
            
            // Simulate reply after 1 second for demo
            setTimeout(() => {
                const replyMsg = {
                    id: Date.now(),
                    sender: conversation.contact.name,
                    text: 'Got it, thanks!',
                    time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
                    date: date
                };
                conversation.messages.push(replyMsg);
                localStorage.setItem('conversations', JSON.stringify(conversations));
                renderMessages(conversation);
            }, 1000);
        }
        
        // Auto-resize textarea
        document.getElementById('messageInput')?.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            
            // Send on Enter (shift+enter for new line)
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
        
        // New Message Modal
        function showNewMessageModal() {
            document.getElementById('newMessageModal').classList.add('active');
            document.getElementById('contactSearch').value = '';
            renderNewMessageContacts();
        }
        
        function closeNewMessageModal() {
            document.getElementById('newMessageModal').classList.remove('active');
        }
        
        function renderNewMessageContacts(filter = '') {
            const container = document.getElementById('newMessageContacts');
            container.innerHTML = '';
            
            const filterLower = filter.toLowerCase();
            
            // Teams section - only show if user can send to teams
            if (canSendToTeams()) {
                const filteredTeams = teams.filter(t => t.name.toLowerCase().includes(filterLower));
                if (filteredTeams.length > 0) {
                    container.innerHTML += '<div class="section-header">Teams</div>';
                    filteredTeams.forEach(team => {
                        const option = createContactOption(team, true);
                        container.appendChild(option);
                    });
                }
            }
            
            // Individuals section
            const filteredEmployees = employees.filter(e => 
                e.name.toLowerCase().includes(filterLower) && 
                e.email !== currentUser.email
            );
            if (filteredEmployees.length > 0) {
                container.innerHTML += '<div class="section-header">People</div>';
                filteredEmployees.forEach(emp => {
                    const option = createContactOption(emp, false);
                    container.appendChild(option);
                });
            }
        }
        
        function createContactOption(contact, isTeam) {
            const div = document.createElement('div');
            div.className = 'contact-option';
            div.onclick = () => startNewConversation(contact, isTeam);
            
            const id = isTeam ? contact.id : contact.email;
            const hasConversation = conversations[id];
            
            div.innerHTML = `
                <div class="avatar ${isTeam ? 'team' : ''}">${getInitials(contact.name)}</div>
                <div class="info">
                    <div class="name">${contact.name}</div>
                    <div class="subtitle">${isTeam ? `${contact.members.length} members` : contact.role}</div>
                </div>
            `;
            
            return div;
        }
        
        function startNewConversation(contact, isTeam) {
            const id = isTeam ? contact.id : contact.email;
            
            if (!conversations[id]) {
                conversations[id] = {
                    contact: contact,
                    isTeam: isTeam,
                    messages: [],
                    unread: 0
                };
                localStorage.setItem('conversations', JSON.stringify(conversations));
            }
            
            closeNewMessageModal();
            openConversation(id);
        }
        
        function filterContacts() {
            const filter = document.getElementById('contactSearch').value;
            renderNewMessageContacts(filter);
        }
        
        // Helper functions
        function getInitials(name) {
            return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) : '?';
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
            
            if (dateStr === today) return 'Today';
            if (dateStr === yesterday) return 'Yesterday';
            
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        // Print transcript
        function printTranscript() {
            if (!currentConversationId) return;
            
            const conversation = conversations[currentConversationId];
            if (!conversation) return;
            
            const isTeam = conversation.isTeam;
            const contactName = conversation.contact.name;
            const userName = currentUser.name || currentUser.email;
            const printDate = new Date().toLocaleString('en-US', { 
                month: 'long', day: 'numeric', year: 'numeric', 
                hour: 'numeric', minute: '2-digit' 
            });
            
            // Build transcript HTML
            let transcriptHTML = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Message Transcript - ${contactName}</title>
                    <style>
                        body {
                            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                            max-width: 800px;
                            margin: 0 auto;
                            padding: 20px;
                            background: white;
                            color: #333;
                        }
                        .header {
                            border-bottom: 2px solid #333;
                            padding-bottom: 20px;
                            margin-bottom: 30px;
                        }
                        .header h1 {
                            margin: 0 0 10px 0;
                            font-size: 1.5rem;
                        }
                        .header .meta {
                            color: #666;
                            font-size: 0.9rem;
                        }
                        .message {
                            margin-bottom: 16px;
                            padding: 12px;
                            border-radius: 8px;
                        }
                        .message.sent {
                            background: #f0f0f0;
                            margin-left: 20%;
                        }
                        .message.received {
                            background: #e8f4f8;
                            margin-right: 20%;
                        }
                        .message-header {
                            font-weight: 600;
                            margin-bottom: 4px;
                            font-size: 0.9rem;
                        }
                        .message-time {
                            color: #666;
                            font-size: 0.8rem;
                            margin-top: 4px;
                        }
                        .date-separator {
                            text-align: center;
                            margin: 30px 0;
                            color: #999;
                            font-size: 0.85rem;
                            font-weight: 600;
                        }
                        @media print {
                            body { padding: 10px; }
                            .no-print { display: none; }
                        }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>Message Transcript</h1>
                        <div class="meta">
                            <strong>Conversation:</strong> ${contactName}${isTeam ? ' (Team Chat)' : ''}<br>
                            <strong>Printed by:</strong> ${userName}<br>
                            <strong>Date:</strong> ${printDate}
                        </div>
                    </div>
                    <div class="messages">
            `;
            
            let lastDate = '';
            conversation.messages.forEach(msg => {
                if (msg.date !== lastDate) {
                    transcriptHTML += `<div class="date-separator">${formatDate(msg.date)}</div>`;
                    lastDate = msg.date;
                }
                
                const isSent = msg.sender === 'You';
                transcriptHTML += `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-header">${isSent ? userName : msg.sender}</div>
                        <div class="message-body">${msg.text}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
            });
            
            transcriptHTML += `
                    </div>
                    <div class="no-print" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ccc; text-align: center;">
                        <button onclick="window.print()" style="padding: 10px 20px; font-size: 1rem; cursor: pointer;">🖨️ Print / Save as PDF</button>
                        <button onclick="window.close()" style="padding: 10px 20px; font-size: 1rem; margin-left: 10px; cursor: pointer;">Close</button>
                    </div>
                </body>
                </html>
            `;
            
            // Open in new window
            const printWindow = window.open('', '_blank', 'width=800,height=600');
            printWindow.document.write(transcriptHTML);
            printWindow.document.close();
        }
        
        function updateMessageBadge() {
            const totalUnread = Object.values(conversations).reduce((sum, conv) => sum + (conv.unread || 0), 0);
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                localStorage.setItem(`badge_messages_${user.email}`, totalUnread.toString());
            }
        }
        
        // Close modal on outside click
        document.getElementById('newMessageModal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeNewMessageModal();
            }
        });
        
        // Initial render
        renderContactsList();
        updateMessageBadge();
        
        // Update badge periodically while on page
        setInterval(updateMessageBadge, 5000);
    </script>
</body>
</html>
